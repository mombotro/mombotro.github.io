<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MomBot OS - Windows 3.x Experience</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Preload essential icons -->
    <link rel="preload" href="assets/icons/computer.png" as="image">
    <link rel="preload" href="assets/icons/paint.png" as="image">
    <link rel="preload" href="assets/icons/wordpad.png" as="image">
    <link rel="preload" href="assets/icons/minesweeper.png" as="image">
    <link rel="preload" href="assets/icons/messenger.png" as="image">
    <link rel="preload" href="assets/icons/browser.png" as="image">
    <link rel="preload" href="assets/icons/mp3player.png" as="image">
    <link rel="preload" href="assets/icons/portfolio.png" as="image">
    <link rel="preload" href="assets/icons/store.png" as="image">
    <link rel="preload" href="assets/icons/guestbook.png" as="image">
    <link rel="preload" href="assets/icons/mom.png" as="image">
    <link rel="preload" href="assets/icons/settings.png" as="image">
    <link rel="preload" href="assets/icons/help.png" as="image">
    <link rel="preload" href="assets/icons/shutdown.png" as="image">
</head>
<body>
    <!-- Desktop Container -->
    <div class="desktop">
        <!-- Desktop icons will be dynamically added here -->
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
        <button class="start-button">Start</button>
        <div class="taskbar-programs"></div>
        <div class="system-tray">
            <div class="tray-icon" title="Volume">🔊</div>
            <div class="tray-icon" title="Network">📡</div>
            <div class="tray-icon" title="Mom Bot">👩</div>
        </div>
        <div class="taskbar-clock"></div>
    </div>

    <!-- Start Menu -->
    <div class="start-menu">
        <!-- Start menu items will be dynamically added here -->
    </div>

    <!-- Loading Screen -->
    <div class="loading-screen" style="display: none;">
        <div class="loading-content">
            <img src="assets/images/loading.gif" alt="Loading...">
            <div class="loading-text">Starting MomBot OS...</div>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="js/main.js"></script>
    
    <!-- Application Scripts -->
    <script src="js/apps/paint.js"></script>
    <script src="js/apps/wordpad.js"></script>
    <script src="js/apps/minesweeper.js"></script>
    <script src="js/apps/messenger.js"></script>
    <script src="js/apps/browser.js"></script>
    <script src="js/apps/mp3player.js"></script>
    <script src="js/apps/mom-bot.js"></script>
    
    <!-- Utility Scripts -->
    <script src="js/utils/window-manager.js"></script>
    <script src="js/utils/file-system.js"></script>
</body>
</html>
