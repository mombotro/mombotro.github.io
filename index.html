<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>need more chickens</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div class="construction-notice panel">
        <p>buildings under construction</p>
    </div>

<div class="telegram-feed panel">
        <h2><a href="https://t.me/mombotpro" target="_blank">tg feed</a></h2>
        <ul id="telegram-posts">
            <li>Loading...</li>
        </ul>
    </div>

    <div id="feed-bag" title="Click to get chicken feed"></div>
    <div id="mouse-feed" class="mouse-feed"></div>

    <!-- Farm Buildings -->
    <div id="farmhouse" class="farm-building" data-room="about">
        <h3>FARMHOUSE</h3>
        <p>about</p>
    </div>

    <div id="chicken-coop" class="farm-building" data-room="comics">
        <h3>CHICKEN COOP</h3>
        <p>comics/webcomics</p>
    </div>

    <div id="workshop" class="farm-building" data-room="tools">
        <h3>WORKSHOP</h3>
        <p>little programs & tools</p>
    </div>

    <div id="garden" class="farm-building" data-room="projects">
        <h3>GARDEN</h3>
        <p>art and drawings</p>
    </div>

    <div id="farm-stand" class="farm-building" data-room="stores">
        <h3>FARM STAND</h3>
        <p>stores</p>
    </div>

    <div id="barn" class="farm-building" data-room="games">
        <h3>BARN</h3>
        <p>games</p>
    </div>

    <!-- Room Expansion Modal -->
    <div id="room-modal" class="room-modal">
        <div class="room-modal-content">
            <button class="room-modal-close">&times;</button>
            <div id="room-content" class="room-content"></div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="./js/chicken.js"></script>
    <script src="./js/egg.js"></script>
    <script src="./js/feed.js"></script>
    <script src="./js/telegram.js"></script>
    <script src="./js/rooms.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
